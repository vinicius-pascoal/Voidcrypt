name: voidcrypt
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/icon.png
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/icons/icon.png
    background_color: "#0B121B"
    theme_color: "#0B121B"
  windows:
    generate: true
    image_path: assets/icons/icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icons/icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/character/
    - assets/enemies/archer/
    - assets/enemies/tank/
    - assets/enemies/summoner/
    - assets/enemies/boss/
    - assets/enemies/pursuer/
    - assets/tiles/tiles_muro/
    - assets/tiles/tiles_piso/
